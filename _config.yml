# ============================================
# 四、其他配置项
# ============================================
# 以下配置项保留用于兼容性，部分可能未在当前版本使用
# ============================================

# RSS 订阅链接
# 类型: String
# 默认值: /atom.xml
rss: /atom.xml

# 文章摘要链接文本（当前未使用）
# 类型: String
# 默认值: Read More
excerpt_link: Read More

# 网站图标路径
# 类型: String
# 默认值: /favicon.png
favicon: /favicon.png

# 浏览器 UI 主题色（meta theme-color），建议与品牌主色一致
theme_color: '#6750A4'

# ============================================
# 页脚（社交图标 + 底栏导航 + 版权）
# show_social: 是否显示社交图标行（数据来自上方 social；默认 true）
# social_intro: 社交图标上方的短句；留空则使用当前语言的 i18n footer_social_intro
# nav: 每项 path 必填；文案用 text（任意语言字符串）或 i18n（对应 languages 中的键）
# ============================================
footer:
  show_social: true
  social_intro: "无聊死了。来找我聊会天。"
  nav:
    - { i18n: home, path: "/" }
    - { i18n: archive_a, path: "/archives" }
    - { i18n: files, path: "/files" }
    - { i18n: about, path: "/about" }

# ============================================
# 五、Hexo 内置配置（保留用于兼容性）
# ============================================
# 以下配置项是 Hexo 主题的标准配置，保留以兼容其他主题
# 注意: 部分配置项在当前主题中可能未使用
# ============================================

# Header 菜单配置（当前未在 topbar 中使用）
# 注意: topbar 中的菜单项是硬编码的，如需修改请编辑 layout/partial/topbar.ejs
menu:
  Home: /
  Categories: /categories
  Archives: /archives
  About: /about

# Content 配置
fancybox: true

# Sidebar 配置（当前未使用）
sidebar: right
widgets:
#- category
#- tag
#- tagcloud
#- archive
#- recent_posts

# 首页主内容区（Hero 下方、分类/标签芯片上方）
# title：主标题，留空则用站点 config.title
# lede：副标题，支持 HTML；两行可用 <span class="notes-subtitle__row">…</span>；链接 href 与站点路径一致即可（默认分类目录为 categories）
index_page:
  title: "生猛活海鲜大排档"
  lede: |
    <span class="notes-subtitle__row">这是什么？白河豚？一刀剁了。这是什么？白河豚？一刀剁了。</span>
    <span class="notes-subtitle__row">这里主要用来堆放我的 <a href="/categories/笔记/">笔记</a> 和随手记下的 <a href="/categories/碎碎念/">碎碎念</a> ，偶尔也会整理一点 <a href="/categories/散文/">长文章</a> 。</span>
    <span class="notes-subtitle__row">如果你想认识我，可以来 <a href="/about/">这里</a> 。</span>

# 首页 / 列表页顶部分类·标签芯片：标签超过此数量时折叠，点「展开」再显示其余（0 = 始终全部展示）
index_taxonomy:
  tags_visible_initial: 8

# 索引页小部件配置（当前未使用）
index_widgets:
# - category
# - tagcloud
# - archive

# 小部件行为配置（当前未使用）
archive_type: 'monthly'
show_count: false

# 分析工具配置（当前未使用）
google_analytics:
gauges_analytics:
twitter:
google_plus:
fb_admins:
fb_app_id:

# 字数统计配置
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: false
  awl: 2
  wpm: 275

# 索引生成器配置
index_generator:
  path: ''
  per_page: 10
  order_by: -updated  # 关键：按 updated 倒序排列

# ============================================
# 六、Markdown 渲染器配置
# ============================================
# 解决一级标题无法跳转的问题
# ============================================
markdown:
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
    quotes: '""'''
  plugins:
    - markdown-it-anchor      # 启用锚点生成插件
    - markdown-it-toc-done-right # 可选
  anchors:
    level: 1                  # 【关键修改】从 1 (H1) 开始生成 ID，默认为 2
    collisionSuffix: ''
    permalink: false          # 是否在标题旁显示 ¶ 符号，按需开启
    permalinkClass: header-anchor
    permalinkSymbol: ¶
